<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes mk-spin     { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
    @keyframes mk-spin-rev { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }
  </style>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C44E5F" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#C44E5F" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#C44E5F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- dark navy background so it reads on any browser chrome -->
  <rect width="200" height="200" fill="#0A0E1C"/>

  <!-- depth & bloom glow -->
  <circle cx="100" cy="100" r="86" fill="url(#glow)"/>

  <!-- rings — spin CW 40s -->
  <g style="transform-box:fill-box;transform-origin:center;animation:mk-spin 40s linear infinite">
    <circle cx="100" cy="100" r="84" fill="none" stroke="#C44E5F" stroke-width="1.4" opacity="0.9"/>
    <circle cx="100" cy="100" r="76" fill="none" stroke="#C44E5F" stroke-width="1.4" opacity="0.7"/>
  </g>

  <!-- web (spokes + octagon + diagonals) — counter-spin CCW 60s -->
  <g style="transform-box:fill-box;transform-origin:center;animation:mk-spin-rev 60s linear infinite">
    <!-- center spokes -->
    <line x1="100" y1="100" x2="100"   y2="50"    stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="135.36" y2="64.64" stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="150"   y2="100"   stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="135.36" y2="135.36" stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="100"   y2="150"   stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="64.64" y2="135.36" stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="50"    y2="100"   stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="100" y1="100" x2="64.64" y2="64.64"  stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <!-- perimeter octagon -->
    <line x1="100"   y1="50"    x2="135.36" y2="64.64"  stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="135.36" y1="64.64" x2="150"   y2="100"   stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="150"   y1="100"   x2="135.36" y2="135.36" stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="135.36" y1="135.36" x2="100"  y2="150"   stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="100"   y1="150"   x2="64.64" y2="135.36" stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="64.64" y1="135.36" x2="50"   y2="100"   stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="50"    y1="100"   x2="64.64" y2="64.64"  stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="64.64" y1="64.64"  x2="100"  y2="50"    stroke="#C44E5F" stroke-width="1.3" stroke-linecap="round"/>
    <!-- skip-2 diagonals (medium density) -->
    <line x1="100"    y1="50"     x2="150"    y2="100"    stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="135.36" y1="64.64"  x2="135.36" y2="135.36" stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="150"    y1="100"    x2="100"    y2="150"    stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="135.36" y1="135.36" x2="64.64"  y2="135.36" stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="100"    y1="150"    x2="50"     y2="100"    stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="64.64"  y1="135.36" x2="64.64"  y2="64.64"  stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="50"     y1="100"    x2="100"    y2="50"     stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="64.64"  y1="64.64"  x2="135.36" y2="64.64"  stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <!-- skip-3 diagonals (full density) -->
    <line x1="100"    y1="50"     x2="135.36" y2="135.36" stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="135.36" y1="64.64"  x2="100"    y2="150"    stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="150"    y1="100"    x2="64.64"  y2="135.36" stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="135.36" y1="135.36" x2="50"     y2="100"    stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="100"    y1="150"    x2="64.64"  y2="64.64"  stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="64.64"  y1="135.36" x2="100"    y2="50"     stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="50"     y1="100"    x2="135.36" y2="64.64"  stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <line x1="64.64"  y1="64.64"  x2="150"    y2="100"    stroke="#C44E5F" stroke-width="1.0" stroke-linecap="round"/>
    <!-- nodes -->
    <circle cx="100"    cy="100"    r="6"   fill="#C44E5F"/>
    <circle cx="100"    cy="50"     r="4.2" fill="#C44E5F"/>
    <circle cx="135.36" cy="64.64"  r="4.2" fill="#C44E5F"/>
    <circle cx="150"    cy="100"    r="4.2" fill="#C44E5F"/>
    <circle cx="135.36" cy="135.36" r="4.2" fill="#C44E5F"/>
    <circle cx="100"    cy="150"    r="4.2" fill="#C44E5F"/>
    <circle cx="64.64"  cy="135.36" r="4.2" fill="#C44E5F"/>
    <circle cx="50"     cy="100"    r="4.2" fill="#C44E5F"/>
    <circle cx="64.64"  cy="64.64"  r="4.2" fill="#C44E5F"/>
  </g>
</svg>
